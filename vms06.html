    <!-- SCRIPT -->
    <script>
        // --- 1. DATA STORES (In-Memory Simulation) ---
        let currentRole = 'user'; // default
        let currentUser = null;
        let activeSettingsTab = 'connection'; // default tab inside settings page

        // ==========================================
        // รายการยศทหารบก (แยกชาย/หญิง) สำหรับ Dropdown ยศ
        // ==========================================
        const THAI_RANKS = {
            "นายทหารสัญญาบัตร (ชาย)": ["พลเอก", "พลโท", "พลตรี", "พ.อ.", "พ.ท.", "พ.ต.", "ร.อ.", "ร.ท.", "ร.ต."],
            "นายทหารประทวน (ชาย)": ["จ.ส.อ.", "จ.ส.ท.", "จ.ส.ต.", "ส.อ.", "ส.ท.", "ส.ต."],
            "นายทหารสัญญาบัตร (หญิง)": ["พ.อ.หญิง", "พ.ท.หญิง", "พ.ต.หญิง", "ร.อ.หญิง", "ร.ท.หญิง", "ร.ต.หญิง"],
            "นายทหารประทวน (หญิง)": ["จ.ส.อ.หญิง", "จ.ส.ท.หญิง", "จ.ส.ต.หญิง", "ส.อ.หญิง", "ส.ท.หญิง", "ส.ต.หญิง"],
            "อื่น ๆ": ["พลทหาร", "พลอาสาสมัคร", "พนักงานราชการ", "ลูกจ้างประจำ"]
        };

        // สร้าง <option> รายการยศทั้งหมด (จัดกลุ่ม optgroup)
        function rankOptionsHtml(selected = "") {
            let found = false;
            let html = Object.entries(THAI_RANKS).map(([group, ranks]) => `
                <optgroup label="${group}">
                    ${ranks.map(r => {
                        const sel = r === selected ? 'selected' : '';
                        if (sel) found = true;
                        return `<option value="${r}" ${sel}>${r}</option>`;
                    }).join('')}
                </optgroup>`).join('');
            // กรณียศเดิมไม่อยู่ในรายการมาตรฐาน ให้เพิ่มเป็นตัวเลือกพิเศษ
            if (selected && !found) {
                html = `<option value="${selected}" selected>${selected}</option>` + html;
            }
            return `<option value="">-- เลือกยศ --</option>` + html;
        }

        // ประกอบ ยศ + ชื่อ + สกุล เป็นชื่อเต็ม
        function getFullName(p) {
            if (!p) return "-";
            return `${p.rank || ''} ${p.firstName || ''} ${p.lastName || ''}`.replace(/\s+/g, ' ').trim() || (p.name || "-");

        // ==========================================

        // ส่งข้อความแจ้งเตือนผ่าน LINE Messaging API
        // - หากตั้งค่า Target ID (User/Group ID) จะใช้ endpoint แบบ push
        // - หากเว้นว่างจะใช้ broadcast ส่งหาผู้ติดตาม OA ทั้งหมด
        // หมายเหตุ: การเรียกจาก Browser โดยตรงอาจติด CORS ของ LINE
        // ระบบจริงควรยิงผ่าน Backend/Google Apps Script Proxy
        async function sendLineNotification(title, message) {
            const token = (systemSettings.lineOaToken || '').trim();
            const targetId = (systemSettings.lineTargetId || "").trim();
            const proxyUrl = (systemSettings.lineProxyUrl || "").trim();

            const text = `🪖 VMS ARMY แจ้งเตือน\n━━━━━━━━━━━━\n📌 ${title}\n${message}\n⏰ ${new Date().toLocaleString('th-TH')}`;

            if (!proxyUrl && (!token || token.startsWith("LINE_OA_TOKEN_SAMPLE"))) {
                console.warn("[LINE OA] ยังไม่ได้ตั้งค่า Token/Proxy จริง — จำลองการส่ง:", text);
                showLineToast('จำลองการแจ้งเตือน LINE OA (ยังไม่ได้ตั้งค่า Token จริง)');
                return { ok: false, simulated: true };
            }

            // ─── โหมดที่ 1: ส่งผ่าน Proxy (Google Apps Script) — แนะนำ เพราะไม่ติด CORS ───
            if (proxyUrl) {
                try {
                    // ส่งแบบ simple request (ไม่ตั้ง Content-Type เป็น application/json)
                    // เพื่อไม่ให้เบราว์เซอร์ยิง preflight OPTIONS ซึ่ง Apps Script ไม่รองรับ
                    const res = await fetch(proxyUrl, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'send', token, to: targetId, text })
                    });
                    const result = await res.json().catch(() => ({}));
                    if (res.ok && (result.status === 200 || result.ok === true)) {
                        showLineToast('ส่งแจ้งเตือน LINE OA สำเร็จ (ผ่าน Proxy)');
                        return { ok: true };
                    } else {
                        console.error('[LINE OA] Proxy ส่งไม่สำเร็จ:', result);
                        showLineToast('ส่งไม่สำเร็จ: ' + (result.body || result.error || ('LINE ตอบสถานะ ' + (result.status || res.status))));
                        return { ok: false, result };
                    }
                } catch (err) {
                    console.error('[LINE OA] เชื่อมต่อ Proxy ไม่ได้:', err);
                    showLineToast('เชื่อมต่อ Proxy ไม่ได้ — ตรวจสอบ URL และการ Deploy ("Anyone" access)');
                    return { ok: false, error: String(err) };
                }
            }

            // ─── โหมดที่ 2: ยิงตรงหา LINE API (มักติด CORS เมื่อรันในเบราว์เซอร์) ───
            const endpoint = targetId
                ? 'https://api.line.me/v2/bot/message/push'
                : 'https://api.line.me/v2/bot/message/broadcast';

            const body = targetId
                ? { to: targetId, messages: [{ type: 'text', text }] }
                : { messages: [{ type: 'text', text }] };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    showLineToast('ส่งแจ้งเตือน LINE OA สำเร็จ');
                    return { ok: true };
                } else {
                    const errText = await res.text();
                    console.error('[LINE OA] ส่งไม่สำเร็จ:', res.status, errText);
                    showLineToast('ส่งแจ้งเตือน LINE OA ไม่สำเร็จ (' + res.status + ')');
                    return { ok: false, status: res.status };
                }
            } catch (err) {
                console.error('[LINE OA] ติด CORS — เบราว์เซอร์ไม่สามารถเรียก api.line.me โดยตรงได้ กรุณาตั้งค่า Proxy URL:', err);
                showLineToast('ติด CORS: เบราว์เซอร์เรียก LINE ตรง ๆ ไม่ได้ — กรุณาตั้งค่า Proxy URL (Apps Script) ในหน้าตั้งค่า');
                return { ok: false, error: String(err) };
            }
        }

        function getNextApproverOfMission(m) {
            const statusToStep = {
                "รอหัวหน้าอนุมัติ": "step_boss",
                "รอรองผู้อำนวยการอนุมัติ": "step_deputy",
                "รอผู้อำนวยการอนุมัติ": "step_director"
            };
            const stepId = statusToStep[m.status];
            if (!stepId) return null;
            const step = systemSettings.approvalChain.find(s => s.id === stepId);
            if (!step || !step.approverId) return null;
            return systemUsers.find(u => u.id === step.approverId) || null;
        }

        async function notifyMission(m, title, message) {
            const result = await sendLineNotification(title, message);
            if (!m.notifyLog) m.notifyLog = [];
            m.notifyLog.push({
                time: new Date().toLocaleString('th-TH', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
                title,
                ok: !!(result && result.ok)
            });
            return result;
        }

        // ตรวจสอบการเชื่อมต่อ LINE Messaging API ด้วย endpoint /v2/bot/info
        async function checkLineConnection() {
            const token = (systemSettings.lineOaToken || '').trim();
            const proxyUrl = (systemSettings.lineProxyUrl || '').trim();
            setConnStatus('line', 'checking', 'กำลังตรวจสอบการเชื่อมต่อกับ LINE Messaging API...');

            if (!token && !proxyUrl) {
                setConnStatus('line', 'failed', 'ยังไม่ได้ระบุ Channel Access Token');
                return;
            }
            if (token.startsWith('LINE_OA_TOKEN_SAMPLE')) {
                setConnStatus('line', 'failed', 'Token ที่ใช้เป็นค่าตัวอย่าง (Sample) กรุณาใส่ Token จริงจาก LINE Developers Console');
                return;
            }

            // ─── ตรวจผ่าน Proxy (Apps Script) — วิธีที่แนะนำ ───
            if (proxyUrl) {
                try {
                    const res = await fetch(proxyUrl, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'check', token })
                    });
                    const info = await res.json().catch(() => null);
                    if (res.ok && info && (info.displayName || info.userId)) {
                        setConnStatus('line', 'connected', `เชื่อมต่อสำเร็จผ่าน Proxy กับ OA: ${info.displayName || 'ไม่ทราบชื่อ'} (Bot ID: ${info.userId || '-'})`);
                    } else if (info && info.message) {
                        setConnStatus('line', 'failed', `LINE ปฏิเสธ: ${info.message} — ตรวจสอบว่า Token เป็นของ Channel ประเภท Messaging API และยังไม่หมดอายุ`);
                    } else {
                        setConnStatus('line', 'failed', 'Proxy ตอบกลับผิดรูปแบบ — ตรวจสอบว่า Deploy โค้ด line_proxy.gs ถูกต้องและเลือก Access = Anyone');
                    }
                } catch (err) {
                    setConnStatus('line', 'failed', 'เชื่อมต่อ Proxy URL ไม่ได้ — ตรวจสอบ URL (ต้องลงท้าย /exec) และการ Deploy เป็น Web App แบบ Anyone');
                }
                return;
            }

            // ─── ตรวจแบบยิงตรง (มักติด CORS) ───
            try {
                const res = await fetch('https://api.line.me/v2/bot/info', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const info = await res.json();
                    setConnStatus('line', 'connected', `เชื่อมต่อสำเร็จกับ OA: ${info.displayName || 'ไม่ทราบชื่อ'} (Bot ID: ${info.userId || '-'})`);
                } else if (res.status === 401) {
                    setConnStatus('line', 'failed', 'Token ไม่ถูกต้องหรือหมดอายุ (401 Unauthorized)');
                } else {
                    setConnStatus('line', 'failed', `LINE API ตอบกลับสถานะ ${res.status}`);
                }
            } catch (err) {
                setConnStatus('line', 'failed', 'ติด CORS: เบราว์เซอร์ไม่สามารถเรียก api.line.me โดยตรงได้ — Token ถูกบันทึกแล้ว กรุณาตั้งค่า "Proxy URL (Apps Script)" เพื่อให้ส่งข้อความได้จริง');
            }
        }

        // ตรวจสอบการเชื่อมต่อ Supabase ด้วย endpoint /auth/v1/health (รองรับ CORS)
        async function checkSupabaseConnection() {
            let url = (systemSettings.dbConfig || '').trim().replace(/\/+$/, '');
            const key = (systemSettings.supabaseKey || '').trim();
            setConnStatus('supabase', 'checking', 'กำลังตรวจสอบการเชื่อมต่อกับ Supabase...');

            if (!url || !key) {
                setConnStatus('supabase', 'failed', 'กรุณาระบุ Supabase API URL และ Anon Key ให้ครบถ้วน');
                return;
            }
            if (!/^https:\/\/[a-z0-9-]+\.supabase\.(co|in)/i.test(url)) {
                setConnStatus('supabase', 'failed', 'รูปแบบ URL ไม่ถูกต้อง — ควรเป็น https://xxxx.supabase.co (Project URL จากหน้า Settings > API)');
                return;
            }

            try {
                const res = await fetch(`${url}/auth/v1/health`, {
                    method: 'GET',
                    headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
                });
                if (res.ok) {
                    setConnStatus('supabase', 'connected', `เชื่อมต่อสำเร็จกับโปรเจกต์ ${url.replace('https://', '')} — ฐานข้อมูลพร้อมใช้งาน`);
                    updateDbStatusIndicator();
                } else if (res.status === 401 || res.status === 403) {
                    setConnStatus('supabase', 'failed', 'Anon Key ไม่ถูกต้องหรือไม่มีสิทธิ์เข้าถึง (401/403)');
                } else {
                    setConnStatus('supabase', 'failed', `Supabase ตอบกลับสถานะ ${res.status}`);
                }
            } catch (err) {
                setConnStatus('supabase', 'failed', 'ไม่สามารถเชื่อมต่อ Supabase ได้ — ตรวจสอบ URL, สัญญาณอินเทอร์เน็ต หรือสถานะโปรเจกต์ (อาจถูก Pause)');
            }
        }

        // อัปเดตไฟสถานะบน Header
        function updateConnIndicators() {
            const dbDot = document.getElementById('dbStatusDot');
            const lineDot = document.getElementById('lineStatusDot');
            if (dbDot) dbDot.className = connDotClass(currentDbConnState().state);

        // คลิกไฟสถานะ → แสดงรายละเอียด
        function showConnStatusInfo(service) {
            let title, s;
            if (service === 'db') {
                title = `ฐานข้อมูล: ${systemSettings.dbType}`;
                s = currentDbConnState();
            } else {
                title = 'การแจ้งเตือน LINE OA';
                s = (systemSettings.connStatus && systemSettings.connStatus.line) || { state: 'unknown', msg: 'ยังไม่ได้ตรวจสอบ' };
            }
            const stateLabel = { connected: '🟢 เชื่อมต่อสำเร็จ', failed: '🔴 เชื่อมต่อไม่ได้ / มีปัญหา', checking: '🟠 กำลังตรวจสอบ...', unknown: '🟠 ยังไม่ได้ตรวจสอบ' };
            Swal.fire({
                title: title,
                html: `
                    <div class="text-left text-sm space-y-2">
                        <p><b>สถานะ:</b> ${stateLabel[s.state] || stateLabel.unknown}</p>
                        <p><b>รายละเอียด:</b> ${s.msg || '-'}</p>
                        ${s.time ? `<p class="text-xs text-slate-400">ตรวจสอบล่าสุด: ${s.time}</p>` : ''}
                        ${currentRole === 'admin' ? '<p class="text-xs text-slate-400 mt-2">ตั้งค่าและตรวจสอบใหม่ได้ที่เมนู "ตั้งค่าระบบและฐานข้อมูล"</p>' : ''}
                    </div>`,
                icon: s.state === 'connected' ? 'success' : s.state === 'failed' ? 'error' : 'info',
                confirmButtonColor: '#4d623a',
                confirmButtonText: 'ปิด'
            });
        }

        // ตรวจสอบการเชื่อมต่อฐานข้อมูลตามประเภทที่เลือก
        async function checkDatabaseConnection() {
            if (systemSettings.dbType === 'Supabase') {
                await checkSupabaseConnection();
            } else {
                await checkGoogleSheetConnection();
            }
        }

        // ตรวจสอบ Google Apps Script Web App URL (GET ต้องตอบ 200)
        async function checkGoogleSheetConnection() {
            const url = (systemSettings.dbConfig || '').trim();
            setConnStatus('gsheet', 'checking', 'กำลังตรวจสอบ Google Apps Script Web App...');
            if (!url || !/^https:\/\/script\.google\.com\//i.test(url)) {
                setConnStatus('gsheet', 'failed', 'URL ไม่ถูกต้อง — ต้องเป็น Web App URL จาก script.google.com (ลงท้าย /exec)');
                return;
            }
            try {
                const res = await fetch(url, { method: 'GET' });
                if (res.ok) {
                    setConnStatus('gsheet', 'connected', 'เชื่อมต่อ Google Apps Script สำเร็จ — พร้อมอ่าน/เขียนข้อมูลลง Google Sheet');
                } else {
                    setConnStatus('gsheet', 'failed', `Apps Script ตอบกลับสถานะ ${res.status} — ตรวจสอบการ Deploy (Access ต้องเป็น Anyone)`);
                }
            } catch (err) {
                setConnStatus('gsheet', 'failed', 'เชื่อมต่อไม่ได้ — ตรวจสอบ URL, อินเทอร์เน็ต หรือการ Deploy Web App (Anyone)');
            }
        }

        // ==========================================
        // CONFIG FILE (.json) — บันทึก/โหลดการตั้งค่าระบบ
        // ==========================================
        // รวมการตั้งค่าทั้งหมดเป็น object เดียว
        function buildConfigObject() {
            return {
                app: "VMS-ARMY",
                configVersion: 1,
                savedAt: new Date().toISOString(),
                settings: {
                    dbType: systemSettings.dbType,
                    dbConfig: systemSettings.dbConfig,
                    sheetId: systemSettings.sheetId,
                    supabaseKey: systemSettings.supabaseKey,
                    lineOaToken: systemSettings.lineOaToken,
                    lineTargetId: systemSettings.lineTargetId,
                    lineProxyUrl: systemSettings.lineProxyUrl,
                    googleCalId: systemSettings.googleCalId,
                    approvalChain: systemSettings.approvalChain
                }
            };
        }

        // ดาวน์โหลดเป็นไฟล์ vms_config.json
        function downloadConfigFile() {
            const cfg = buildConfigObject();
            const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'vms_config.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // นำค่าจาก config มาใช้กับระบบ
        function applyConfig(cfg) {
            if (!cfg || !cfg.settings) return false;
            const st = cfg.settings;
            const keys = ['dbType', 'dbConfig', 'sheetId', 'supabaseKey', 'lineOaToken', 'lineTargetId', 'lineProxyUrl', 'googleCalId'];
            keys.forEach(k => { if (st[k] !== undefined) systemSettings[k] = st[k]; });
            if (Array.isArray(st.approvalChain) && st.approvalChain.length) {
                systemSettings.approvalChain = st.approvalChain;
            }
            updateDbStatusIndicator();
            return true;
        }

        // โหลด vms_config.json อัตโนมัติตอนเปิดระบบ (หากวางไฟล์ไว้ข้าง ๆ ไฟล์ HTML บนเว็บเซิร์ฟเวอร์)
        async function tryAutoLoadConfig() {
            try {
                const res = await fetch('vms_config.json', { cache: 'no-store' });
                if (!res.ok) return;
                const cfg = await res.json();
                if (applyConfig(cfg)) {
                    showLineToast('โหลดการตั้งค่าจาก vms_config.json สำเร็จ');
                    checkDatabaseConnection();
                    checkLineConnection();
                }
            } catch (err) {
                // ไม่มีไฟล์ config หรือเปิดแบบ file:// — ใช้ค่าเริ่มต้นตามปกติ
            }
        }

        // นำเข้าไฟล์ config ด้วยตนเองจากหน้าตั้งค่า
        function triggerConfigImport() {
            document.getElementById('configFileInput').click();
        }

        function handleConfigImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const cfg = JSON.parse(e.target.result);
                    if (applyConfig(cfg)) {
                        Swal.fire('นำเข้าสำเร็จ', 'โหลดการตั้งค่าจากไฟล์ Config เรียบร้อย ระบบกำลังตรวจสอบการเชื่อมต่อ', 'success').then(() => {
                            renderSettings();
                            checkDatabaseConnection();
                            checkLineConnection();
                        });
                    } else {
                        Swal.fire('ไฟล์ไม่ถูกต้อง', 'โครงสร้างไฟล์ Config ไม่ตรงกับระบบ VMS', 'error');
                    }
                } catch (err) {
                    Swal.fire('ไฟล์ไม่ถูกต้อง', 'ไม่สามารถอ่านไฟล์ JSON ได้', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function submitRequest(event) {
            event.preventDefault();
            
            const reqDateStr = document.getElementById('reqDate').value;
            const pDate = document.getElementById('reqPickupDate').value;
            const pTime = document.getElementById('reqPickupTime').value;
            const dDate = document.getElementById('reqDropDate').value;
            const dTime = document.getElementById('reqDropTime').value;

            const firstActiveStep = systemSettings.approvalChain.find(step => step.enabled);
            let initialStatus = "รอหัวหน้าอนุมัติ";
            if (firstActiveStep) {
                if (firstActiveStep.id === "step_deputy") initialStatus = "รอรองผู้อำนวยการอนุมัติ";
                else if (firstActiveStep.id === "step_director") initialStatus = "รอผู้อำนวยการอนุมัติ";
                else if (firstActiveStep.id === "step_transport") initialStatus = "อนุมัติแล้ว"; 
            }

            const newReq = {
                id: `REQ-2026-${String(missions.length + 1).padStart(4, '0')}`,
                reqDate: reqDateStr,
                requester: `${document.getElementById('reqFirstName').value.trim()} ${document.getElementById('reqLastName').value.trim()}`,
                rank: document.getElementById('reqRank').value,
                position: document.getElementById('reqPos').value,
                dept: document.getElementById('reqDept').value,
                vehicleType: document.getElementById('reqVehType').value,
                purpose: document.getElementById('reqPurpose').value,
                passengersCount: parseInt(document.getElementById('reqPassengersCount').value),
                cargoWeight: document.getElementById('reqCargoWeight').value || "0",
                cargoVol: document.getElementById('reqCargoVol').value || "0",
                controllerName: `${document.getElementById('reqControllerRank').value} ${document.getElementById('reqControllerFirstName').value.trim()} ${document.getElementById('reqControllerLastName').value.trim()}`,
                controllerPos: document.getElementById('reqControllerPos').value,
                controllerPhone: document.getElementById('reqControllerPhone').value,
                pickupPlace: document.getElementById('reqPickupPlace').value,
                pickupDateTime: `${pDate} ${pTime}`,
                dropPlace: document.getElementById('reqDropPlace').value,
                dropDateTime: `${dDate} ${dTime}`,
                travelType: document.getElementById('reqTravelType').value,
                passengersList: document.getElementById('reqPassengersList').value,
                docs: { name: "เอกสารประกอบขออนุมัติ.pdf", size: "1.4 MB" },
                status: initialStatus,
                approvals: {
                    boss: { name: "ร.ท. สมัคร สมานจิตร", status: "รอดำเนินการ", date: "" },
                    deputy: { name: "ร.อ. คมสันต์ เดินดี", status: "รอดำเนินการ", date: "" },
                    director: { name: "พ.อ. สมเกียรติ ศักดิ์ศรี", status: "รอดำเนินการ", date: "" },
                    transport: { name: currentUser ? currentUser.name : "ร.อ. คมสันต์ เดินดี", status: "รอดำเนินการ", date: "" }
                },
                assignedVehicle: "",
                assignedDriver: "",
                tripLog: null
            };

            missions.push(newReq);

            // แจ้งเตือน LINE OA ถึงผู้อนุมัติขั้นถัดไปโดยระบุชื่อ
            const nextApprover = getNextApproverOfMission(newReq);
            notifyMission(
                newReq,
                '📥 มีคำขอใช้รถราชการใหม่ (ย.42)',
                `เลขที่: ${newReq.id}\nผู้ขอ: ${newReq.rank} ${newReq.requester}\nหน่วย: ${newReq.dept}\nภารกิจ: ${newReq.purpose}\nปลายทาง: ${newReq.dropPlace}\nกำหนดเดินทาง: ${newReq.pickupDateTime}\nสถานะ: ${newReq.status}${nextApprover ? `\n👉 รอการพิจารณาจาก: ${getFullName(nextApprover)}` : ''}\n\nกรุณาเข้าระบบ VMS เพื่อพิจารณาอนุมัติ`
            );

            Swal.fire({
                title: 'ยื่นคำขอสำเร็จ!',
                text: 'ระบบได้นำเข้าคำขอจองรถ ย.42 สำเร็จ และส่งแจ้งเตือนไปยังผู้บังคับบัญชาผ่าน LINE OA แล้ว',
                icon: 'success',
                confirmButtonColor: '#4d623a',
                confirmButtonText: 'ตกลง'
            }).then(() => {
                renderRequestList();
            });
        }

            Swal.fire({

                html: `

                        <div class="grid grid-cols-3 gap-2">

                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">สกุล</label>
                                <input type="text" id="drvLastName" value="${driverData ? (driverData.lastName || '') : ''}" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700" placeholder="นามสกุล">

                            <input type="tel" id="drvPhone" value="${driverData ? driverData.phone : ''}" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700" placeholder="ระบุเบอร์โทร">
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">ประเภทใบอนุญาตขับขี่</label>
                                <select id="drvLicense" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700">
                                    <option value="ท.1" ${driverData && driverData.licenseType === 'ท.1' ? 'selected' : ''}>ท.1</option>
                                    <option value="ท.2" ${driverData && driverData.licenseType === 'ท.2' ? 'selected' : ''}>ท.2</option>
                                    <option value="ท.3" ${driverData && driverData.licenseType === 'ท.3' ? 'selected' : ''}>ท.3</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">วันหมดอายุใบขับขี่ (วว/ดด/ปป)</label>
                                <input type="text" id="drvExpiry" value="${driverData ? driverData.expiry : ''}" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700" placeholder="เช่น 31/12/2028">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">สถานะ</label>
                            <select id="drvStatus" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700">
                                <option value="พร้อมปฏิบัติงาน" ${driverData && driverData.status === 'พร้อมปฏิบัติงาน' ? 'selected' : ''}>พร้อมปฏิบัติงาน</option>
                                <option value="อยู่ระหว่างภารกิจ" ${driverData && driverData.status === 'อยู่ระหว่างภารกิจ' ? 'selected' : ''}>อยู่ระหว่างภารกิจ</option>
                                <option value="พักใช้งาน" ${driverData && driverData.status === 'พักใช้งาน' ? 'selected' : ''}>พักใช้งาน</option>
                            </select>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#4d623a',
                confirmButtonText: 'บันทึกข้อมูล',
                cancelButtonText: 'ยกเลิก'
            }).then((res) => {
                if(res.isConfirmed) {
                    const rank = document.getElementById('drvRank').value;
                    const firstName = document.getElementById('drvFirstName').value.trim();
                    const lastName = document.getElementById('drvLastName').value.trim();
                    const name = `${firstName} ${lastName}`.trim();
                    const phone = document.getElementById('drvPhone').value;
                    const licenseType = document.getElementById('drvLicense').value;
                    const expiry = document.getElementById('drvExpiry').value;
                    const status = document.getElementById('drvStatus').value;

                    if (!rank || !firstName || !lastName || !phone) {
                        Swal.fire('ข้อผิดพลาด', 'กรุณาระบุ ยศ ชื่อ สกุล และเบอร์โทรให้ครบถ้วน', 'warning');
                        return;
                    }

                    if (driverData) {
                        const idx = drivers.findIndex(d => d.id === drvId);
                        if (idx !== -1) {
                            drivers[idx] = { ...drivers[idx], rank, firstName, lastName, name, phone, licenseType, expiry, status };
                        }
                    } else {
                        const newId = `DRV00${drivers.length + 1}`;
                        drivers.push({
                            id: newId, rank, firstName, lastName, name, phone, licenseType, expiry, lastMission: "-", status
                        });
                    }

                    Swal.fire('บันทึกสำเร็จ', 'อัปเดตข้อมูลบัญชีพลขับเรียบร้อยแล้ว', 'success').then(() => {
                        renderDrivers();
                    });
                }
            });
        }

                        renderDrivers();
                    });
                }
            });
        }

            }).then((res) => {
                if(res.isConfirmed) {
                    const username = document.getElementById('usrUsername').value;
                    const pass = document.getElementById('usrPassword').value;
                    const rank = document.getElementById('usrRank').value;
                    const firstName = document.getElementById('usrFirstName').value.trim();
                    const lastName = document.getElementById('usrLastName').value.trim();
                    const name = `${firstName} ${lastName}`.trim();
                    const dept = document.getElementById('usrDept').value;
                    const role = document.getElementById('usrRole').value;
                    const approvalLevel = parseInt(document.getElementById('usrApprovalLevel').value) || 0;

                    if (!username || !pass || !rank || !firstName || !lastName) {
                        Swal.fire('ข้อผิดพลาด', 'กรุณาระบุ Username, รหัสผ่าน, ยศ, ชื่อ และสกุลให้ครบถ้วน', 'warning');
                        return;
                    }

                    let savedUserId = userId;
                    if (userData) {
                        const idx = systemUsers.findIndex(u => u.id === userId);
                        if (idx !== -1) {
                            systemUsers[idx] = { ...systemUsers[idx], username, password: pass, rank, firstName, lastName, name, dept, role, approvalLevel };
                        }
                    } else {
                        savedUserId = `USR00${systemUsers.length + 1}`;
                        systemUsers.push({ id: savedUserId, username, password: pass, rank, firstName, lastName, name, dept, role, approvalLevel });
                    }

                    // ผูกผู้ใช้เป็นผู้อนุมัติในสายงานตามลำดับขั้นที่เลือก
                    if (approvalLevel > 0 && systemSettings.approvalChain[approvalLevel - 1]) {
                        systemSettings.approvalChain[approvalLevel - 1].approverId = savedUserId;
                        // ผู้ใช้อื่นที่เคยถือลำดับขั้นเดียวกันให้ปลดออก
                        systemUsers.forEach(u => {
                            if (u.id !== savedUserId && u.approvalLevel === approvalLevel) u.approvalLevel = 0;
                        });
                    }

                    Swal.fire('สำเร็จ', 'อัปเดตรายชื่อสิทธิ์ผู้ใช้เสร็จสิ้น', 'success').then(() => {
                        renderUserManagement();
                    });
                }
            });
        }

        // ==========================================
        // SETTINGS & DATABASE LOGIC (กู้สำรองข้อมูลจริง)
        // ==========================================
        function toggleDatabaseType(type) {
            systemSettings.dbType = type;
            if (type === 'Google Sheet') {
                systemSettings.dbConfig = "https://script.google.com/macros/s/AKfycbz_SampleAppScriptURL/exec";
            } else {
                systemSettings.dbConfig = "https://api.supabase.co/v1/projects/vms-army";
            }
            updateDbStatusIndicator();
            renderSettings();
        }

        function saveApiSettings() {
            const lineToken = document.getElementById('setLineToken');
            const gCal = document.getElementById('setGCal');
            const dbConfig = document.getElementById('setDbConfig');
            
            if (lineToken) systemSettings.lineOaToken = lineToken.value;
            const lineTarget = document.getElementById('setLineTarget');
            if (lineTarget) systemSettings.lineTargetId = lineTarget.value.trim();
            if (gCal) systemSettings.googleCalId = gCal.value;
            if (dbConfig) systemSettings.dbConfig = dbConfig.value;

            if (systemSettings.dbType === 'Google Sheet') {
                const sheetId = document.getElementById('setSheetId');
                if (sheetId) systemSettings.sheetId = sheetId.value;
            } else {
                const supabaseKey = document.getElementById('setSupabaseKey');
                if (supabaseKey) systemSettings.supabaseKey = supabaseKey.value;
            }

            // เก็บค่าจากส่วน LINE ด้วย (กรณีกดปุ่มบันทึกภาพรวมโดยตรง)
            const lineTargetOverall = document.getElementById('setLineTarget');
            if (lineTargetOverall) systemSettings.lineTargetId = lineTargetOverall.value.trim();
            const lineProxyOverall = document.getElementById('setLineProxy');
            if (lineProxyOverall) systemSettings.lineProxyUrl = lineProxyOverall.value.trim();

            // สร้างไฟล์ Config (.json) อัตโนมัติเมื่อบันทึกภาพรวม
            downloadConfigFile();

            // ตรวจสอบการเชื่อมต่อฐานข้อมูลและ LINE ทันที เพื่ออัปเดตไฟสถานะบน Header
            checkDatabaseConnection();
            checkLineConnection();

            Swal.fire({
                title: 'บันทึกสำเร็จ',
                html: `บันทึกการตั้งค่าทั้งหมดและดาวน์โหลดไฟล์ <b>vms_config.json</b> แล้ว<br>
                       <span class="text-xs text-slate-500">นำไฟล์ไปวางไว้ในโฟลเดอร์เดียวกับไฟล์ระบบ (บนเว็บเซิร์ฟเวอร์) เพื่อให้โหลดค่าอัตโนมัติทุกครั้งที่เปิดระบบ</span>`,
                icon: 'success',
                confirmButtonColor: '#4d623a'
            });
        }

        // --- ระบบกู้สำรองข้อมูล Backup & Restore ---
        let loadedBackupData = null; // ตัวแปรเก็บชั่วคราวขณะจะกู้คืนระบบ

        function triggerFileSelect() {
            document.getElementById('restoreFileInput').click();
        }

        function handleRestoreFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileNamePlaceholder').innerText = `เลือกไฟล์สำเร็จ: ${file.name}`;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData.systemUsers && parsedData.missions && parsedData.drivers && parsedData.vehicles) {
                        loadedBackupData = parsedData;
                        Swal.fire('ตรวจเจอโครงสร้างข้อมูลสำเร็จ', 'ข้อมูลในไฟล์ถูกต้อง สามารถคลิก "กู้ระบบคืนค่าฐานข้อมูลนี้" เพื่อนำเข้า', 'info');
                    } else {
                        Swal.fire('ผิดพลาด', 'ไฟล์ที่เลือกไม่มีคีย์ตารางข้อมูลสำคัญของระบบ VMS', 'error');
                        loadedBackupData = null;
                    }
                } catch(err) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถแยกวิเคราะห์โครงสร้าง JSON ได้ ไฟล์อาจเสียหาย', 'error');
                    loadedBackupData = null;
                }
            };
            reader.readAsText(file);
        }

        function runDatabaseRestore() {
            if (!loadedBackupData) {
                Swal.fire('แจ้งเตือน', 'กรุณาอัปโหลดไฟล์สำรองข้อมูล (.json) ก่อนกดปุ่มกู้คืน', 'warning');
                return;
            }

            Swal.fire({
                title: 'ยืนยันการล้างและฟื้นฟูระบบ?',
                text: "ข้อมูลปัจจุบันในหน่วยงานขณะนี้จะถูกทับแทนด้วยข้อมูลในไฟล์สำรองทั้งหมด",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'กู้ระบบทันที',
                cancelButtonText: 'ยกเลิก'
            }).then((res) => {
                if (res.isConfirmed) {
                    // เขียนทับค่า
                    systemUsers = loadedBackupData.systemUsers;
                    systemSettings = loadedBackupData.systemSettings || systemSettings;
                    drivers = loadedBackupData.drivers;
                    vehicles = loadedBackupData.vehicles;
                    missions = loadedBackupData.missions;

                    Swal.fire('เรียบร้อย', 'ฐานข้อมูลของท่านถูกย้อนหลังและฟื้นคืนค่าเสร็จสมบูรณ์!', 'success').then(() => {
                        loadedBackupData = null;
                        document.getElementById('fileNamePlaceholder').innerText = 'คลิกเพื่ออัปโหลดไฟล์ VMS_BACKUP_xxxx.json';
                        updateDbStatusIndicator();
                        renderSettings();
                    });
                }
            });
        }

        function exportSystemBackup() {
            const packageBackup = {
                systemUsers,
                systemSettings,
                drivers,
                vehicles,
                missions
            };

            const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(JSON.stringify(packageBackup, null, 2))}`;
            const downloadLink = document.createElement('a');
            downloadLink.setAttribute('href', jsonString);
            downloadLink.setAttribute('download', `VMS_BACKUP_${new Date().toISOString().slice(0, 10)}.json`);
            document.body.appendChild(downloadLink);
            downloadLink.click();
            downloadLink.remove();

            Swal.fire('ดาวน์โหลดสำเร็จ', 'ส่งออกข้อมูลเก็บไว้ในอุปกรณ์ของคุณเรียบร้อยแล้ว', 'success');
        }

        // --- ระบบแปลงข้อมูลข้ามประเภทจำลอง (Migration Simulation) ---
        function triggerMigration(type) {
            const consolePanel = document.getElementById('migrationConsole');
            consolePanel.classList.remove('hidden');
            consolePanel.innerHTML = '';

            const logs = [];
            
            if (type === 'gs_to_sb') {
                logs.push('⚡ [MIGRATION START] ย้ายแผ่นงาน Google Sheets เข้าสู่ Supabase');
                logs.push('🔌 Connecting to Google App Script Web Service...');
                logs.push(`🔍 Fetching Google Spreadsheet ID: ${systemSettings.sheetId}`);
                logs.push(`📦 ดึงแถวข้อมูล flat-rows จำนวน ${missions.length} แถว`);
                logs.push('✅ ดึงข้อมูลสำเร็จ! เริ่มวิเคราะห์ความสัมพันธ์และสร้าง SQL Schema...');
                logs.push('🛠️ สร้างตาราง "users" และแปลงข้อมูลผู้ใช้เข้าสู่ Supabase Auth');
                logs.push(`👥 ย้ายข้อมูลสิทธิ์กำลังพลสำเร็จ: ${systemUsers.length} บัญชี`);
                logs.push('🛠️ สร้างตาราง "vehicles" และแปลงเลขตัวรถ...');
                logs.push(`🚘 ย้ายข้อมูลและเช็กสภาพคลังรถยนต์: ${vehicles.length} รายการ`);
                logs.push('🛠️ สร้างตาราง "drivers" และตรวจสอบสิทธิ์พนักงานขับรถ...');
                logs.push(`👨‍✈️ แมปปิ้งวันหมดอายุใบอนุญาตขับขี่พลขับ: ${drivers.length} นาย`);
                logs.push('🛠️ ทำการ Normalise ตาราง "missions" และตั้งค่า Foreign Keys...');
                logs.push(`📋 เชื่อมตารางจัดเก็บคำขอจอง ย.42 สำเร็จ: ${missions.length} รายการ`);
                logs.push('🎉 [MIGRATION COMPLETE] การแปลงและโอนย้ายข้อมูลจาก Google Sheet เข้า Supabase เสร็จสมบูรณ์!');
            } else {
                logs.push('⚡ [MIGRATION START] ส่งออกและแบนตาราง Relational จาก Supabase เข้าสู่ Google Sheet');
                logs.push(`🔌 เชื่อมต่อ Supabase API: ${systemSettings.dbConfig}`);
                logs.push('🔍 ดึงข้อมูลความสัมพันธ์ SQL (Joint table: missions INNER JOIN vehicles INNER JOIN drivers)');
                logs.push('⚙️ กำลังทำการรวมฟิลด์แถวข้อมูล (Flattening database tables)...');
                logs.push('✅ รวมข้อมูลให้แบนราบเหมาะสมกับรูปแบบ Spreadsheet เรียบร้อย');
                logs.push('📤 ส่งต่อ JSON payload ไปยัง Apps Script Endpoint...');
                logs.push(`📝 บันทึกข้อมูลเขียนทับหน้าชีต Google Spreadsheet เรียบร้อยแล้ว (${missions.length} รายการ)`);
                logs.push('🎉 [MIGRATION COMPLETE] การแปลงโครงสร้างข้อมูล Supabase กลับสู่ Google Sheet สำเร็จ!');
            }

            // จำลองประมวลผลเขียนบรรทัดล็อกทีละบรรทัด
            let idx = 0;
            function writeLog() {
                if (idx < logs.length) {
                    const p = document.createElement('p');
                    p.innerText = logs[idx];
                    consolePanel.appendChild(p);
                    consolePanel.scrollTop = consolePanel.scrollHeight;
                    idx++;
                    setTimeout(writeLog, 600);
                } else {
                    Swal.fire({
                        title: 'การแปลงข้อมูลเสร็จสิ้น',
                        text: 'ระบบทำการย้าย แมปปิ้งโครงสร้าง และเขียนตารางข้อมูลเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#4d623a'
                    });
                }
            }
            writeLog();
        }

        function approveRequest(reqId, status) {
            const missionIndex = missions.findIndex(m => m.id === reqId);
            if (missionIndex !== -1) {
                if (status === 'อนุมัติ') {
                    missions[missionIndex].status = "อนุมัติแล้ว";
                    missions[missionIndex].approvals.director = { name: getFullName(currentUser), status: "อนุมัติแล้ว", date: new Date().toLocaleString() };

                    // แจ้งเตือนผู้ขอและงานขนส่งผ่าน LINE OA (บันทึกประวัติแจ้งเตือน)
                    notifyMission(
                        missions[missionIndex],
                        '✅ คำขอใช้รถได้รับการอนุมัติ',
                        `เลขที่: ${reqId}\nผู้อนุมัติ: ${getFullName(currentUser)}\nภารกิจ: ${missions[missionIndex].purpose}\nสถานะ: ส่งต่อให้แผนกยานพาหนะจัดสรรรถและพลขับ`
                    );

                    Swal.fire('อนุมัติแล้ว', `คำขอ ${reqId} ได้รับอนุมัติเข้าคลังจัดสรรยานพาหนะแล้ว`, 'success').then(() => {
                        renderDirectorApprovals();
                    });
                }
            }
        }

        function autoMatch(reqId, type) {
            const fitVeh = vehicles.find(v => v.type.includes(type) && v.status === "พร้อมใช้งาน") || vehicles.find(v => v.status === "พร้อมใช้งาน");
            const fitDrv = drivers.find(d => d.status === "พร้อมปฏิบัติงาน" && d.licenseType !== "ท.1"); 

            if(fitVeh) {
                document.getElementById(`dispatchVeh_${reqId}`).value = fitVeh.id;
            }
            if(fitDrv) {
                document.getElementById(`dispatchDrv_${reqId}`).value = fitDrv.id;
            }

            Swal.fire({
                title: 'ระบุข้อมูลอัจฉริยะสำเร็จ',
                text: 'ระบบจับคู่อัตโนมัติและจัดสรรตารางเรียบร้อย',
                icon: 'info',
                timer: 1500,
                showConfirmButton: false
            });
        }

        function saveDispatch(reqId) {
            const vehId = document.getElementById(`dispatchVeh_${reqId}`).value;
            const drvId = document.getElementById(`dispatchDrv_${reqId}`).value;

            if(!vehId || !drvId) {
                Swal.fire('ข้อมูลไม่ครบถ้วน', 'กรุณาเลือกทั้ง ยานพาหนะ และ พลขับรถยนต์ทหาร', 'warning');
                return;
            }

            const missionIndex = missions.findIndex(m => m.id === reqId);
            if(missionIndex !== -1) {
                missions[missionIndex].assignedVehicle = vehId;
                missions[missionIndex].assignedDriver = drvId;
                
                const vIdx = vehicles.findIndex(v => v.id === vehId);
                const dIdx = drivers.findIndex(d => d.id === drvId);
                if(vIdx !== -1) vehicles[vIdx].status = "อยู่ระหว่างใช้งาน";
                if(dIdx !== -1) drivers[dIdx].status = "อยู่ระหว่างภารกิจ";

                // แจ้งเตือนพลขับที่ได้รับมอบหมายผ่าน LINE OA (บันทึกประวัติแจ้งเตือน)
                const assignedVeh = vehicles[vIdx];
                const assignedDrv = drivers[dIdx];
                notifyMission(
                    missions[missionIndex],
                    '🚚 มอบหมายภารกิจขับรถใหม่',
                    `เลขที่: ${reqId}\nพลขับ: ${assignedDrv ? getFullName(assignedDrv) : drvId}\nรถ: ${assignedVeh ? assignedVeh.brand + ' ' + assignedVeh.model + ' [' + assignedVeh.plate + ']' : vehId}\nภารกิจ: ${missions[missionIndex].purpose}\nกำหนดเดินทาง: ${missions[missionIndex].pickupDateTime}`
                );

                Swal.fire({
                    title: 'จัดสรรสำเร็จ',
                    text: 'บันทึกประวัติ สั่งการพลขับและผูกตารางการใช้ลงปฏิทินสำเร็จแล้ว',
                    icon: 'success',
                    confirmButtonColor: '#4d623a'
                }).then(() => {
                    renderDispatch();
                });
            }
        }

        function renderCalendar() {
            const canvas = document.getElementById('mainCanvas');
            canvas.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <div class="flex items-center justify-between mb-4 pb-3 border-b">
                        <div>
                            <h3 class="font-bold text-slate-800 text-base">ตารางปฏิทินการใช้รถราชการประจำวัน/เดือน (วว/ดด/ปป - เวลา 24 ชม.)</h3>
                        </div>
                    </div>
                    <div id='calendarContainer' class="h-[600px] text-xs"></div>
                </div>
            `;

            const calendarEvents = missions.map(m => {
                let color = '#d97706'; 
                if(m.status === 'อนุมัติแล้ว') color = '#16a34a'; 
                if(m.status === 'เสร็จสิ้นภารกิจ') color = '#2563eb'; 

                // แปลงรูปแบบ DD/MM/YYYY HH:MM เพื่อแปลงเป็นมาตรฐาน ISO YYYY-MM-DDTHH:MM สำหรับปฏิทิน
                const parts = m.pickupDateTime.split(' ');
                const dateParts = parts[0].split('/');
                const time = parts[1];
                const isoStart = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}T${time}`;

                const rparts = m.dropDateTime.split(' ');
                const rdateParts = rparts[0].split('/');
                const rtime = rparts[1];
                const isoEnd = `${rdateParts[2]}-${rdateParts[1]}-${rdateParts[0]}T${rtime}`;

                return {
                    id: m.id,
                    title: `[${m.id}] ${m.purpose.substring(0, 15)}... (${m.dropPlace})`,
                    start: isoStart,
                    end: isoEnd,
                    backgroundColor: color,
                    borderColor: color,
                }
            });

            setTimeout(() => {
                const calendarEl = document.getElementById('calendarContainer');
                const calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'th',
                    events: calendarEvents,
                    eventClick: function(info) {
                        viewRequestDetails(info.event.id);
                    }
                });
                calendar.render();
            }, 100);
        }

            }).then((res) => {

                        });

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // รองรับฟอนต์ไทยใน Excel
            csvContent += "เลขภารกิจ,ผู้เสนอขอ,วัตถุประสงค์,ปลายทาง,ยานพาหนะ,วันที่เริ่มต้น,วันที่กลับ,ระยะทางวิ่ง (กม.),ค่าน้ำมัน (บาท),ค่าทางด่วน (บาท),ค่าใช้อื่นๆ (บาท),สถานะ\n";

            missions.forEach(m => {
                const distance = m.tripLog ? m.tripLog.totalDistance : 0;
                const fuel = m.tripLog ? m.tripLog.fuelCost : 0;
                const toll = m.tripLog ? m.tripLog.tollCost : 0;
                const other = m.tripLog ? m.tripLog.otherCost : 0;
                const row = [
                    m.id,
                    m.requester,
                    `"${m.purpose.replace(/"/g, '""')}"`,
                    m.dropPlace,
                    m.vehicleType,
                    m.pickupDateTime,
                    m.dropDateTime,
                    distance,
                    fuel,
                    toll,
                    other,
                    m.status
                ].join(",");
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `VMS_Detailed_Report_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            Swal.fire('สำเร็จ', 'ส่งออกข้อมูล CSV ประวัติการเงินระยะทางสะสม และเริ่มการดาวน์โหลดเข้าอุปกรณ์ของคุณแล้ว', 'success');

        function updateStepApprover(stepId, approverId) {
            const step = systemSettings.approvalChain.find(s => s.id === stepId);
            if (step) {
                step.approverId = approverId;

                // ซิงก์ลำดับขั้นการอนุมัติกลับไปยังโปรไฟล์ผู้ใช้
                const stepIndex = systemSettings.approvalChain.findIndex(s => s.id === stepId);
                systemUsers.forEach(u => {
                    if (u.approvalLevel === stepIndex + 1 && u.id !== approverId) u.approvalLevel = 0;
                    if (u.id === approverId) u.approvalLevel = stepIndex + 1;
                });

                // ค้นหาชื่อเพื่อนำมาแจ้งเตือน
                const user = systemUsers.find(u => u.id === approverId);
                const userNameText = user ? getFullName(user) : 'ยังไม่ได้ระบุ';

                Swal.fire({
                    title: 'บันทึกสำเร็จ',
                    text: `มอบหมายสิทธิ์ให้ "${userNameText}" เป็นผู้อนุมัติขั้นตอนเรียบร้อยแล้ว`,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => renderSettings());
            }
        }

        // เลื่อนลำดับขั้นตอนการอนุมัติขึ้น/ลง
        function moveApprovalStep(stepId, direction) {
            const chain = systemSettings.approvalChain;
            const index = chain.findIndex(s => s.id === stepId);
            const newIndex = index + direction;
            if (index === -1 || newIndex < 0 || newIndex >= chain.length) return;
            [chain[index], chain[newIndex]] = [chain[newIndex], chain[index]];
            // อัปเดตลำดับขั้นในโปรไฟล์ผู้ใช้ให้ตรงกับตำแหน่งใหม่
            chain.forEach((step, i) => {
                systemUsers.forEach(u => {
                    if (u.id === step.approverId) u.approvalLevel = i + 1;
                });
            });
            renderSettings();
        }

        function splitThaiDate(dtStr) {
            const result = { day: '..........', month: '....................', year: '..........', time: '..........' };
            if (!dtStr) return result;
            const [datePart, timePart] = dtStr.trim().split(/\s+/);
            if (timePart) result.time = timePart + ' น.';
            const seg = (datePart || '').split('/');
            if (seg.length === 3) {
                const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
                result.day = String(parseInt(seg[0], 10) || seg[0]);
                const mIdx = parseInt(seg[1], 10) - 1;
                if (months[mIdx]) result.month = months[mIdx];
                let y = parseInt(seg[2], 10);
                if (!isNaN(y)) result.year = String(y < 2400 ? y + 543 : y); // แปลง ค.ศ. → พ.ศ.
            }
            return result;
        }

        // พิมพ์แบบฟอร์ม "ใบขออนุญาตใช้รถ" ทบ.๔๖๑-๐๐๑ (ย.๔๒) ปลายขั้ว — ตามแบบราชการ
        function printY42Form(reqId) {
            const m = missions.find(x => x.id === reqId);
            if(!m) return;

            const reqD = splitThaiDate(m.reqDate);
            const goD = splitThaiDate(m.pickupDateTime);
            const backD = splitThaiDate(m.dropDateTime);

            // จำนวนเที่ยว: ดึงตัวเลขจากประเภทการเดินทาง เช่น "ไปและกลับ (1 เที่ยว)"
            const tripMatch = (m.travelType || '').match(/(\d+)/);
            const tripCount = tripMatch ? tripMatch[1] : '๑';

            // เรียน: ผู้มีอำนาจอนุมัติ (ผู้อนุมัติขั้นสุดท้ายที่เปิดใช้งานในสายงาน)
            const lastStep = [...systemSettings.approvalChain].reverse().find(s => s.enabled);
            const lastApprover = lastStep ? systemUsers.find(u => u.id === lastStep.approverId) : null;
            const salutation = lastApprover ? `ผบ. ${lastApprover.dept}` : 'ผู้บังคับหน่วย (ผู้มีอำนาจอนุมัติ)';

            // ช่วยเติมเส้นประใต้ข้อความแบบฟอร์มราชการ
            const dot = (text, minWidth = '80px') => `<span style="border-bottom:1px dotted #000; padding:0 8px; font-weight:600; display:inline-block; min-width:${minWidth}; text-align:center;">${text || '&nbsp;'}</span>`;

            const printArea = document.getElementById('printForm');
            printArea.innerHTML = `
                <div style="max-width:800px; margin:0 auto; padding:24px 32px; font-family:'Sarabun', serif; line-height:2.1; color:#000; font-size:15px;">

                    <!-- หัวแบบฟอร์ม -->
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="width:120px;"></div>
                        <div style="flex:1; text-align:center;">
                            <div style="font-size:24px; font-weight:bold; letter-spacing:1px;">ใบขออนุญาตใช้รถ</div>
                        </div>
                        <div style="width:120px; text-align:right; font-size:14px; line-height:1.6;">
                            <div style="font-weight:bold;">ทบ. ๔๖๑–๐๐๑</div>
                            <div>(ย.๔๒)</div>
                            <div style="font-weight:bold;">ปลายขั้ว</div>
                        </div>
                    </div>

                    <!-- ที่ / ส่วนราชการ / วันที่ -->
                    <div style="display:flex; justify-content:space-between; margin-top:12px;">
                        <div>ที่ ${dot(m.id, '140px')}</div>
                        <div style="text-align:right;">
                            <div>ส่วนราชการ ${dot(m.dept, '220px')}</div>
                            <div>วันที่ ${dot(reqD.day, '50px')} เดือน ${dot(reqD.month, '110px')} พ.ศ. ${dot(reqD.year, '70px')}</div>
                        </div>
                    </div>

                    <div style="margin-top:8px;">เรียน ${dot(salutation, '300px')}</div>

                    <div style="text-indent:48px;">
                        ข้าพเจ้า ${dot(`${m.rank} ${m.requester}`, '220px')} ตำแหน่ง ${dot(m.position, '200px')}
                    </div>

                    <div>ขอใช้รถ (ชนิดรถ) ${dot(m.vehicleType, '400px')}</div>

                    <div>เพื่อไปราชการ ${dot(m.purpose, '480px')}</div>

                    <div>
                        จำนวน ${dot(m.passengersCount, '60px')} คน
                        สิ่งของหนักประมาณ ${dot(m.cargoWeight ? m.cargoWeight + ' กก.' : '-', '110px')}
                        ปริมาตร ${dot(m.cargoVol || '-', '110px')}
                    </div>

                    <div>
                        ผู้ควบคุมรถ (ยศ,ชื่อ) ${dot(m.controllerName, '210px')}
                        ตำแหน่ง ${dot(m.controllerPos, '130px')}
                        โทรศัพท์ ${dot(m.controllerPhone, '110px')}
                    </div>

                    <div>
                        ไปรับที่ ${dot(m.pickupPlace, '180px')}
                        ตั้งแต่วันที่ ${dot(goD.day, '45px')} เดือน ${dot(goD.month, '95px')} พ.ศ. ${dot(goD.year, '60px')} เวลา ${dot(goD.time, '80px')}
                    </div>

                    <div>
                        ไปส่งที่ ${dot(m.dropPlace, '180px')}
                        ถึงวันที่ ${dot(backD.day, '45px')} เดือน ${dot(backD.month, '95px')} พ.ศ. ${dot(backD.year, '60px')} เวลา ${dot(backD.time, '80px')}
                    </div>

                    <div>ไปและกลับ ${dot(tripCount, '70px')} เที่ยว</div>

                    <!-- ลงชื่อผู้ขอ -->
                    <div style="display:flex; justify-content:flex-end; margin-top:20px;">
                        <div style="text-align:center; min-width:340px;">
                            <div>ลงชื่อ ${dot(`${m.rank} ${m.requester}`, '240px')}</div>
                            <div style="margin-top:6px;">ตำแหน่ง ${dot(m.position, '240px')}</div>
                        </div>
                    </div>

                    <!-- หมายเหตุท้ายแบบ -->
                    <div style="margin-top:28px; border-top:1px solid #000; padding-top:8px; font-size:14px;">
                        <span style="font-weight:bold; text-decoration:underline;">หมายเหตุ</span>
                        &nbsp;ให้เสนอรายงานตามลำดับชั้นถึงผู้มีอำนาจอนุมัติ
                    </div>
                </div>
            `;
            window.print();
        }

        // ==========================================
        // PAGE: ผังโครงสร้างหน่วยงาน (Org Chart)
        // ระดับ: กองทัพ > กองพล > กรม > กองพัน > กอง > แผนก
        // ==========================================
        function renderOrgChart() {
            const canvas = document.getElementById('mainCanvas');

            // นับจำนวนกำลังพลในแต่ละหน่วย (จาก systemUsers ที่สังกัดชื่อหน่วยตรงกัน)
            const countMembers = (unitName) => systemUsers.filter(u => u.dept === unitName).length;

            // เรนเดอร์ต้นไม้หน่วยงานแบบ Recursive
            const renderNode = (parentId, depth = 0) => {
                const children = orgUnits.filter(o => o.parentId === parentId);
                if (children.length === 0) return '';
                return children.map(unit => {
                    const members = countMembers(unit.name);
                    const style = ORG_LEVEL_STYLE[unit.level] || ORG_LEVEL_STYLE["แผนก"];
                    return `
                        <div class="${depth > 0 ? 'ml-4 md:ml-8 border-l-2 border-dashed border-slate-300 pl-3 md:pl-5' : ''} mt-3">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 bg-white border border-slate-200 rounded-xl p-3 hover:border-army-600 hover:shadow-md transition-all">
                                <div class="flex items-center space-x-3 min-w-0">
                                    <div class="w-9 h-9 rounded-lg bg-army-700 text-amber-400 flex items-center justify-center flex-shrink-0">
                                        <i data-lucide="${depth === 0 ? 'landmark' : depth < 3 ? 'shield' : 'users'}" class="w-4.5 h-4.5"></i>
                                    </div>
                                    <div class="min-w-0">
                                        <div class="flex items-center flex-wrap gap-2">
                                            <span class="font-bold text-sm text-slate-800 truncate">${unit.name}</span>
                                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${style}">${unit.level}</span>
                                        </div>
                                        <p class="text-[10px] text-slate-400 mt-0.5">รหัสหน่วย: ${unit.id} ${members > 0 ? `| กำลังพลในระบบ: ${members} นาย` : ''}</p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-1.5 flex-shrink-0 self-end sm:self-auto">
                                    <button onclick="openOrgModal(null, '${unit.id}')" title="เพิ่มหน่วยรอง" class="p-1.5 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-lg transition-all">
                                        <i data-lucide="plus" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="openOrgModal('${unit.id}')" title="แก้ไข" class="p-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition-all">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="deleteOrgUnit('${unit.id}')" title="ลบ" class="p-1.5 bg-red-100 hover:bg-red-200 text-red-600 rounded-lg transition-all">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            ${renderNode(unit.id, depth + 1)}
                        </div>
                    `;
                }).join('');
            };

            canvas.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-3">
                        <div>
                            <h3 class="font-bold text-lg text-slate-800 flex items-center">
                                <i data-lucide="network" class="w-5 h-5 mr-2 text-army-700"></i>
                                ผังโครงสร้างหน่วยงาน (Organization Chart)
                            </h3>
                            <p class="text-xs text-slate-500">จัดการสายการบังคับบัญชา 6 ระดับ: กองทัพ ➜ กองพล ➜ กรม ➜ กองพัน ➜ กอง ➜ แผนก</p>
                        </div>
                        <button onclick="openOrgModal()" class="bg-army-700 hover:bg-army-800 text-white font-bold py-2 px-4 rounded-lg text-xs flex items-center space-x-1 shadow self-start md:self-auto">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i>
                            <span>เพิ่มหน่วยงานใหม่</span>
                        </button>
                    </div>

                    <div class="px-6 pt-4 flex flex-wrap gap-2">
                        ${ORG_LEVELS.map(lv => `
                            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold border ${ORG_LEVEL_STYLE[lv]}">
                                ${lv} (${orgUnits.filter(o => o.level === lv).length})
                            </span>
                        `).join('')}
                    </div>

                    <div class="p-6 pt-3">
                        ${orgUnits.length === 0 ? `
                            <div class="text-center py-10 text-slate-400">
                                <i data-lucide="network" class="w-12 h-12 mx-auto mb-2"></i>
                                <span class="block">ยังไม่มีหน่วยงานในระบบ กด "เพิ่มหน่วยงานใหม่" เพื่อเริ่มต้น</span>
                            </div>
                        ` : renderNode(null)}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Modal เพิ่ม/แก้ไขหน่วยงาน
        function openOrgModal(unitId = null, defaultParentId = null) {
            const unitData = unitId ? orgUnits.find(o => o.id === unitId) : null;
            const title = unitData ? 'แก้ไขข้อมูลหน่วยงาน' : 'เพิ่มหน่วยงานใหม่';
            const selectedParent = unitData ? unitData.parentId : defaultParentId;

            Swal.fire({
                title: `<span class="text-sm font-bold text-army-800 block">${title}</span>`,
                html: `
                    <div class="text-left space-y-4 text-xs">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อหน่วยงาน</label>
                            <input type="text" id="orgName" value="${unitData ? unitData.name : ''}" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700" placeholder="เช่น กองพันทหารราบที่ 2">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">ระดับหน่วย</label>
                                <select id="orgLevel" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700">
                                    ${ORG_LEVELS.map(lv => `<option value="${lv}" ${unitData && unitData.level === lv ? 'selected' : ''}>${lv}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">หน่วยบังคับบัญชา (หน่วยแม่)</label>
                                <select id="orgParent" class="w-full border p-2 rounded focus:ring-1 focus:ring-army-700">
                                    <option value="">-- ไม่มี (หน่วยสูงสุด) --</option>
                                    ${orgUnits.filter(o => !unitId || o.id !== unitId).map(o => `
                                        <option value="${o.id}" ${o.id === selectedParent ? 'selected' : ''}>[${o.level}] ${o.name}</option>
                                    `).join('')}
                                </select>
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#4d623a',
                confirmButtonText: 'บันทึกหน่วยงาน',
                cancelButtonText: 'ยกเลิก'
            }).then((res) => {
                if (res.isConfirmed) {
                    const name = document.getElementById('orgName').value.trim();
                    const level = document.getElementById('orgLevel').value;
                    const parentId = document.getElementById('orgParent').value || null;

                    if (!name) {
                        Swal.fire('ข้อผิดพลาด', 'กรุณาระบุชื่อหน่วยงาน', 'warning');
                        return;
                    }

                    if (unitData) {
                        const idx = orgUnits.findIndex(o => o.id === unitId);
                        if (idx !== -1) orgUnits[idx] = { ...orgUnits[idx], name, level, parentId };
                    } else {
                        const newId = `ORG${String(orgUnits.length + 1).padStart(3, '0')}`;
                        orgUnits.push({ id: newId, name, level, parentId });
                    }

                    Swal.fire('บันทึกสำเร็จ', 'อัปเดตผังโครงสร้างหน่วยงานเรียบร้อยแล้ว', 'success').then(() => {
                        renderOrgChart();
                    });
                }
            });
        }

        // ลบหน่วยงาน (ตรวจสอบหน่วยรองก่อน)
        function deleteOrgUnit(unitId) {
            const hasChildren = orgUnits.some(o => o.parentId === unitId);
            if (hasChildren) {
                Swal.fire('ไม่สามารถลบได้', 'หน่วยงานนี้มีหน่วยรองอยู่ในสังกัด กรุณาย้ายหรือลบหน่วยรองก่อน', 'error');
                return;
            }
            Swal.fire({
                title: 'ยืนยันการลบหน่วยงาน?',
                text: 'หน่วยงานนี้จะถูกนำออกจากผังโครงสร้างถาวร',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ใช่, ลบหน่วยงาน',
                cancelButtonText: 'ยกเลิก'
            }).then((res) => {
                if (res.isConfirmed) {
                    orgUnits = orgUnits.filter(o => o.id !== unitId);
                    Swal.fire('ลบเรียบร้อย', 'นำหน่วยงานออกจากผังแล้ว', 'success').then(() => renderOrgChart());
                }
            });
        }

        function toggleStepStatus(stepId) {
            const step = systemSettings.approvalChain.find(s => s.id === stepId);
            if (step) {
                step.enabled = !step.enabled;
                renderSettings();
            }
        }
    </script>
</body>
</html>
